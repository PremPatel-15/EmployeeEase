<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Department View Frame</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="d_view.css" />
        <link rel="shortcut icon" href="/favicon.png" type="image/x-icon" />
    </head>
    <body>
        <div class="sup-container">
            <div class="header">
                <h5>Output</h5>
                <button
                    type="button"
                    class="btn btn-outline-info b"
                    id="showbtn"
                >
                    show
                </button>
            </div>
            <hr />
            <div class="input-group mb-3">
                <span class="input-group-text text-custom"
                    >Department ID:
                </span>
                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter Id you want see"
                    id="deptId"
                />
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text">Department Name: </span>
                <ul class="list-group">
                    <li class="list-group-item" id="deptName">HR</li>
                </ul>
            </div>
        </div>

        <script src="d_view.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
